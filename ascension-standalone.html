<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASCENSION — Year 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@100;300&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00c3ff;
  --blue: #1a8cff;
  --glow: #66e0ff;
  --warn: #ff3b3b;
  --bg: #020412;
  --panel-bg: rgba(0,195,255,0.04);
  --panel-border: rgba(0,195,255,0.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:'Share Tech Mono',monospace;color:white;}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
#grainCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:0.035;mix-blend-mode:screen;}
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 42%,rgba(0,0,0,0.55) 72%,rgba(0,0,0,0.88) 100%);}
#scanSweep{position:fixed;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(0,195,255,0.025) 40%,rgba(0,195,255,0.07) 50%,rgba(0,195,255,0.025) 60%,transparent 100%);z-index:3;pointer-events:none;opacity:0;}
#scanSweep.sweeping{opacity:1;animation:scanMove 2.6s ease-in-out;}
@keyframes scanMove{0%{left:-60%}100%{left:110%}}

/* LETTERBOX */
.letterbox{position:fixed;width:100%;background:#000;z-index:50;transition:height 1.2s cubic-bezier(0.77,0,0.175,1);}
.top{top:0;height:7vh;}
.bottom{bottom:0;height:7vh;}

/* INTRO */
#introScreen{position:fixed;inset:0;background:#000;z-index:100;display:flex;justify-content:center;align-items:center;cursor:pointer;transition:opacity 1.2s ease;}
#introScreen.fade-out{opacity:0;pointer-events:none;}
#introScreen::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,195,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,195,255,0.04) 1px,transparent 1px);background-size:55px 55px;}
.glitch-ring{position:absolute;inset:0;overflow:hidden;}
.gl{position:absolute;left:0;width:100%;height:1px;background:rgba(0,195,255,0.3);animation:glLine 4.5s infinite;}
.gl:nth-child(1){top:25%;animation-delay:0s;}
.gl:nth-child(2){top:55%;animation-delay:1.4s;}
.gl:nth-child(3){top:78%;animation-delay:2.9s;}
@keyframes glLine{0%{transform:scaleX(0);opacity:0}10%{transform:scaleX(1);opacity:1}16%{transform:scaleX(0.2);opacity:.2}22%{transform:scaleX(1);opacity:1}45%{opacity:0}100%{opacity:0}}
#introContent{text-align:center;z-index:1;}
.sig-line{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,8vw,5rem);font-weight:900;letter-spacing:.25em;color:var(--cyan);text-shadow:0 0 30px var(--cyan),0 0 60px rgba(0,195,255,.3);animation:sigFlicker 3s ease forwards;}
.sig-small{font-size:clamp(.85rem,3vw,1.4rem);font-weight:400;letter-spacing:.5em;color:rgba(0,195,255,.7);margin-top:14px;text-shadow:0 0 15px var(--cyan);animation:sigFlicker 3s .5s ease forwards;}
@keyframes sigFlicker{0%{opacity:0}5%{opacity:1}8%{opacity:.15}11%{opacity:1}100%{opacity:1}}
.tap-hint{margin-top:56px;font-size:clamp(.6rem,2vw,.8rem);letter-spacing:.3em;color:rgba(255,255,255,.3);animation:tapPulse 2s infinite;}
@keyframes tapPulse{0%,100%{opacity:.3}50%{opacity:.9}}

/* HUD */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity .8s ease;}
#hud.visible{opacity:1;}
.hud-panel{position:absolute;background:var(--panel-bg);border:1px solid var(--panel-border);backdrop-filter:blur(4px);padding:12px 15px;font-size:.7rem;line-height:1.85;}
.hud-panel::before{content:'';position:absolute;top:0;left:0;width:18px;height:18px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan);opacity:.6;}
.hud-panel::after{content:'';position:absolute;bottom:0;right:0;width:18px;height:18px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan);opacity:.6;}
.top-left{top:9vh;left:2vw;width:clamp(190px,21vw,270px);animation:sIL .8s ease both;}
.top-right{top:9vh;right:2vw;width:clamp(175px,19vw,250px);text-align:right;animation:sIR .8s ease both;}
.left-panel{left:2vw;top:50%;transform:translateY(-50%);width:clamp(190px,21vw,270px);animation:sIL .8s .2s ease both;}
.right-panel{right:2vw;top:50%;transform:translateY(-50%);width:clamp(175px,19vw,235px);animation:sIR .8s .2s ease both;}
.bottom-console{bottom:9vh;left:50%;transform:translateX(-50%);width:clamp(280px,54vw,680px);max-height:17vh;overflow:hidden;animation:sIU .8s .4s ease both;}
@keyframes sIL{from{opacity:0;transform:translateX(-25px)}to{opacity:1;transform:translateX(0)}}
@keyframes sIR{from{opacity:0;transform:translateX(25px)}to{opacity:1;transform:translateX(0)}}
@keyframes sIU{from{opacity:0;transform:translateX(-50%) translateY(18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hud-label{color:var(--cyan);font-weight:bold;letter-spacing:.08em;font-size:.73rem;}
.hud-sub{color:rgba(255,255,255,.45);font-size:.66rem;}
.panel-title{color:rgba(0,195,255,.45);font-size:.62rem;letter-spacing:.18em;margin-bottom:9px;border-bottom:1px solid var(--panel-border);padding-bottom:5px;}
.data-row{display:flex;justify-content:space-between;margin:3px 0;gap:6px;}
.data-label{color:rgba(255,255,255,.4);font-size:.63rem;}
.data-value{color:white;font-size:.66rem;text-align:right;}
.cyan{color:var(--cyan)!important;text-shadow:0 0 7px var(--cyan);}
.warn-txt{color:var(--warn)!important;text-shadow:0 0 7px var(--warn);animation:wP 2s infinite;}
@keyframes wP{0%,100%{opacity:1}50%{opacity:.4}}
.blink{animation:blink .9s infinite;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.scan-bar-wrap{width:100%;height:2px;background:rgba(0,195,255,.13);margin:5px 0;border-radius:1px;overflow:hidden;}
.scan-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 5px var(--cyan);transition:width .3s ease;}
.signal-bars{display:flex;justify-content:flex-end;gap:3px;align-items:flex-end;height:16px;margin:4px 0;}
.signal-bars span{width:4px;background:var(--cyan);box-shadow:0 0 4px var(--cyan);border-radius:1px 1px 0 0;animation:sPulse 1.5s infinite;}
.signal-bars span:nth-child(1){height:3px;animation-delay:0s;}
.signal-bars span:nth-child(2){height:6px;animation-delay:.1s;}
.signal-bars span:nth-child(3){height:9px;animation-delay:.2s;}
.signal-bars span:nth-child(4){height:13px;animation-delay:.3s;}
.signal-bars span:nth-child(5){height:16px;animation-delay:.4s;}
@keyframes sPulse{0%,100%{opacity:1}50%{opacity:.35}}
.radar-wrap{display:flex;justify-content:center;margin-top:7px;}
#radarCanvas{border-radius:50%;box-shadow:0 0 10px rgba(0,195,255,.18);}
#consoleLog{font-size:.66rem;color:rgba(0,195,255,.8);line-height:1.9;overflow:hidden;}
.console-cursor{color:var(--cyan);font-size:.72rem;animation:blink .7s infinite;}

/* MAIN TEXT */
#overlay{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;z-index:8;pointer-events:none;}
#mainText{font-family:'Orbitron',sans-serif;font-size:clamp(1.1rem,4vw,2.8rem);font-weight:700;text-align:center;letter-spacing:.2em;text-transform:uppercase;opacity:0;transition:opacity 1.5s ease;text-shadow:0 0 20px rgba(0,195,255,.45),0 0 55px rgba(0,195,255,.12);max-width:70vw;line-height:1.6;padding:0 2rem;}
#mainText.cyan-txt{color:var(--cyan);text-shadow:0 0 25px var(--cyan),0 0 70px rgba(0,195,255,.25);}
#mainText.big-txt{font-size:clamp(2rem,7vw,5rem);letter-spacing:.3em;}
#mainText.data-txt{font-family:'Share Tech Mono',monospace;font-size:clamp(.82rem,2.4vw,1.35rem);letter-spacing:.3em;color:var(--cyan);line-height:2.1;}
#mainText.glitch-txt{animation:tGlitch .5s ease;}
@keyframes tGlitch{0%{transform:translate(0);filter:none}20%{transform:translate(-3px,1px);filter:hue-rotate(90deg)}40%{transform:translate(3px,-1px)}60%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0)}}

#endFrame{position:fixed;bottom:11vh;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:clamp(.6rem,1.4vw,.82rem);letter-spacing:.5em;color:rgba(0,195,255,.5);opacity:0;transition:opacity 2.5s ease;z-index:12;text-align:center;white-space:nowrap;}
#endFrame.vis{opacity:1;}

@media(max-width:768px){.left-panel,.right-panel,.top-left,.top-right{display:none;}.bottom-console{width:90vw;}#mainText{max-width:90vw;}}
</style>
</head>
<body>

<div class="letterbox top"></div>
<div class="letterbox bottom"></div>
<div id="scanSweep"></div>
<canvas id="grainCanvas"></canvas>
<div id="vignette"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-panel top-left">
    <div class="hud-label">ORBITAL AI V4.7</div>
    <div class="hud-sub">LOCATION: LOW EARTH ORBIT</div>
    <div class="hud-sub">SCAN: <span class="cyan blink">ACTIVE</span></div>
    <div class="cyan blink" style="font-size:.65rem;margin-top:4px;">_</div>
  </div>
  <div class="hud-panel top-right">
    <div class="hud-label" id="utcClock">00:00:00 UTC</div>
    <div class="signal-bars"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="hud-sub">SIGNAL: <span class="cyan">94%</span></div>
  </div>
  <div class="hud-panel left-panel">
    <div class="panel-title">// DATA FEED</div>
    <div class="data-row"><span class="data-label">POPULATION</span><span class="data-value cyan" id="popCounter">8,045,311,447</span></div>
    <div class="data-row"><span class="data-label">SURFACE TEMP</span><span class="data-value">+14.8°C</span></div>
    <div class="data-row"><span class="data-label">O₂ LEVEL</span><span class="data-value cyan">20.95%</span></div>
    <div class="data-row"><span class="data-label">AI SCAN</span><span class="data-value" id="scanPct">0%</span></div>
    <div class="scan-bar-wrap"><div class="scan-bar" id="scanBar"></div></div>
    <div class="data-row"><span class="data-label">THREAT</span><span class="data-value warn-txt">MODERATE</span></div>
  </div>
  <div class="hud-panel right-panel">
    <div class="panel-title">// TACTICAL</div>
    <div class="radar-wrap"><canvas id="radarCanvas" width="150" height="150"></canvas></div>
    <div class="hud-sub" style="margin-top:7px;text-align:center;">CONTACTS: <span class="cyan" id="targetCount">0</span></div>
  </div>
  <div class="hud-panel bottom-console">
    <div class="panel-title">// SYSTEM LOG</div>
    <div id="consoleLog"></div>
    <div class="console-cursor">█</div>
  </div>
</div>

<!-- INTRO -->
<div id="introScreen">
  <div class="glitch-ring"><div class="gl"></div><div class="gl"></div><div class="gl"></div></div>
  <div id="introContent">
    <div class="sig-line">SIGNAL DETECTED</div>
    <div class="sig-line sig-small">ORIGIN: SOL-3</div>
    <div class="tap-hint" style="margin-top:55px;">[ TAP ANYWHERE TO INITIALIZE ]</div>
  </div>
</div>

<div id="overlay"><div id="mainText"></div></div>
<canvas id="bg"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
// ── PERFORMANCE ──────────────────────────────
const isLowEnd = (navigator.hardwareConcurrency||4) <= 4 || window.devicePixelRatio < 1.5;
const isMobile = window.innerWidth < 768;

// ── THREE SCENE ──────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas:document.querySelector('#bg'),antialias:!isLowEnd});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,isLowEnd?1:2));
camera.position.z = 7;

// ── LIGHTS ────────────────────────────────────
scene.add(Object.assign(new THREE.PointLight(0xffffff,2.5,500),{position:{x:12,y:5,z:10}}));
const sunLight = new THREE.PointLight(0xffffff,2.5,500);
sunLight.position.set(12,5,10);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x080820,0.5));

// ── PROCEDURAL EARTH ─────────────────────────
// Build Earth with canvas textures (no external files)
function makeEarthDayTex() {
  const c = document.createElement('canvas'); c.width=1024; c.height=512;
  const ctx = c.getContext('2d');
  // Deep ocean
  const g = ctx.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#0a2a6b'); g.addColorStop(0.5,'#0d3d80'); g.addColorStop(1,'#0a2a6b');
  ctx.fillStyle=g; ctx.fillRect(0,0,1024,512);
  // Continents
  const landColor=['#2d5a27','#3a7a2e','#4a6a1e','#6b8a3a','#8a9a4a'];
  const rng = (s)=>{ let x=Math.sin(s)*10000; return x-Math.floor(x); };
  for(let i=0;i<180;i++){
    const seed=i*137.5;
    const x=rng(seed)*1024, y=rng(seed+1)*512;
    const rx=rng(seed+2)*120+40, ry=rng(seed+3)*60+20;
    const r=Math.floor(rng(seed+4)*landColor.length);
    ctx.save();ctx.translate(x,y);ctx.scale(1,ry/rx);
    ctx.beginPath();ctx.arc(0,0,rx,0,Math.PI*2);
    ctx.fillStyle=landColor[r];ctx.fill();ctx.restore();
  }
  // Ice caps
  ctx.fillStyle='rgba(220,235,255,0.8)';
  ctx.fillRect(0,0,1024,35);
  ctx.fillRect(0,475,1024,37);
  const tex = new THREE.CanvasTexture(c);
  return tex;
}

function makeNightTex() {
  const c = document.createElement('canvas'); c.width=1024; c.height=512;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,1024,512);
  const rng=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
  // City light clusters
  for(let i=0;i<3000;i++){
    const x=rng(i*7.3)*1024, y=rng(i*13.1)*512;
    const alpha=rng(i*3.7)*0.9+0.1;
    const hue = rng(i*2.1)<0.7 ? '#fff5aa' : '#aaccff';
    ctx.fillStyle=hue;
    ctx.globalAlpha=alpha;
    ctx.fillRect(x,y,1,1);
  }
  ctx.globalAlpha=1;
  return new THREE.CanvasTexture(c);
}

function makeCloudTex() {
  const c = document.createElement('canvas'); c.width=1024; c.height=512;
  const ctx = c.getContext('2d');
  ctx.fillStyle='transparent'; ctx.clearRect(0,0,1024,512);
  const rng=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
  for(let i=0;i<90;i++){
    const x=rng(i*9.1)*1024, y=rng(i*4.7)*512;
    const r=rng(i*2.3)*80+30;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,0.45)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

function makeGalaxyTex() {
  const c = document.createElement('canvas'); c.width=2048; c.height=1024;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#020412'; ctx.fillRect(0,0,2048,1024);
  const rng=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
  // Stars
  for(let i=0;i<4000;i++){
    const x=rng(i*7.3)*2048, y=rng(i*11.7)*1024;
    const sz=rng(i*3.1)<0.95?0.5:1.2;
    const bright=rng(i*2.9)*0.7+0.3;
    const blue=rng(i*5.1)<0.3;
    ctx.fillStyle=blue?`rgba(160,200,255,${bright})`:`rgba(255,255,255,${bright})`;
    ctx.fillRect(x,y,sz,sz);
  }
  // Nebula wisps
  for(let i=0;i<12;i++){
    const x=rng(i*17)*2048, y=rng(i*23)*1024;
    const r=rng(i*7)*200+80;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    const hue=rng(i*3.7)<0.5?'rgba(0,40,120,0.07)':'rgba(20,0,60,0.07)';
    g.addColorStop(0,hue); g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  const tex=new THREE.CanvasTexture(c);
  tex.mapping=THREE.EquirectangularReflectionMapping;
  return tex;
}

// Build scene
scene.background = makeGalaxyTex();

const earthGeo = new THREE.SphereGeometry(2, isLowEnd?48:96, isLowEnd?48:96);
const earthMat = new THREE.MeshPhongMaterial({
  map: makeEarthDayTex(),
  emissiveMap: makeNightTex(),
  emissive: new THREE.Color(0xffffff),
  emissiveIntensity: 0.6,
  specular: new THREE.Color(0x224466),
  shininess: 25,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// Atmosphere
const atmMat = new THREE.MeshPhongMaterial({
  color:0x0055ff,emissive:0x0033bb,emissiveIntensity:1.4,
  transparent:true,opacity:0.13,side:THREE.BackSide
});
const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(2.18,64,64), atmMat);
scene.add(atmosphere);

// Clouds
let clouds=null;
if(!isLowEnd){
  clouds = new THREE.Mesh(
    new THREE.SphereGeometry(2.045,64,64),
    new THREE.MeshPhongMaterial({map:makeCloudTex(),transparent:true,opacity:0.6,depthWrite:false})
  );
  scene.add(clouds);
}

// Orbital rings
function makeRing(radius,color,opacity){
  const m=new THREE.Mesh(new THREE.TorusGeometry(radius,0.003,2,128),new THREE.MeshBasicMaterial({color,transparent:true,opacity}));
  return m;
}
const ring1=makeRing(2.85,0x00c3ff,0.22); ring1.rotation.x=Math.PI*0.28; scene.add(ring1);
const ring2=makeRing(3.35,0x1a8cff,0.13); ring2.rotation.x=-Math.PI*0.18; ring2.rotation.z=0.3; scene.add(ring2);

// Stars
const sGeo=new THREE.BufferGeometry();
const sCount=isLowEnd?600:2200;
const sArr=new Float32Array(sCount*3);
for(let i=0;i<sCount*3;i++) sArr[i]=(Math.random()-0.5)*180;
sGeo.setAttribute('position',new THREE.BufferAttribute(sArr,3));
const stars=new THREE.Points(sGeo,new THREE.PointsMaterial({size:0.06,color:0xaaccff}));
scene.add(stars);

// Bloom
let composer=null,bloom=null;
if(!isLowEnd){
  composer=new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene,camera));
  bloom=new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.85,0.45,0.2);
  composer.addPass(bloom);
}

// ── FILM GRAIN ────────────────────────────────
const grainCanvas=document.getElementById('grainCanvas');
const gCtx=grainCanvas.getContext('2d');
function resizeGrain(){grainCanvas.width=innerWidth;grainCanvas.height=innerHeight;}
resizeGrain();
let gFrame=0;
function renderGrain(){
  gFrame++;
  if(gFrame%3!==0||isMobile) return;
  const w=grainCanvas.width,h=grainCanvas.height;
  const img=gCtx.createImageData(w,h);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
  gCtx.putImageData(img,0,0);
}

// ── RADAR ──────────────────────────────────────
const rCvs=document.getElementById('radarCanvas');
const rCtx=rCvs.getContext('2d');
let rAngle=0,rBlips=[];
function drawRadar(){
  const w=rCvs.width,h=rCvs.height,cx=w/2,cy=h/2,r=w/2-3;
  rCtx.clearRect(0,0,w,h);
  rCtx.beginPath();rCtx.arc(cx,cy,r,0,Math.PI*2);
  rCtx.fillStyle='rgba(0,15,35,0.9)';rCtx.fill();
  rCtx.strokeStyle='rgba(0,195,255,0.14)';rCtx.lineWidth=0.5;
  [.3,.55,.8,1].forEach(f=>{rCtx.beginPath();rCtx.arc(cx,cy,r*f,0,Math.PI*2);rCtx.stroke();});
  rCtx.beginPath();rCtx.moveTo(cx-r,cy);rCtx.lineTo(cx+r,cy);rCtx.moveTo(cx,cy-r);rCtx.lineTo(cx,cy+r);
  rCtx.strokeStyle='rgba(0,195,255,0.08)';rCtx.stroke();
  // Sweep
  rCtx.save();rCtx.translate(cx,cy);rCtx.rotate(rAngle);
  rCtx.beginPath();rCtx.moveTo(0,0);rCtx.arc(0,0,r,-0.7,0);rCtx.closePath();
  rCtx.fillStyle='rgba(0,195,255,0.1)';rCtx.fill();
  rCtx.beginPath();rCtx.moveTo(0,0);rCtx.lineTo(r,0);
  rCtx.strokeStyle='rgba(0,195,255,0.85)';rCtx.lineWidth=1;rCtx.stroke();
  rCtx.restore();
  // Blips
  rBlips=rBlips.filter(b=>b.age<110);
  rBlips.forEach(b=>{
    const alpha=Math.max(0,1-b.age/110);
    rCtx.beginPath();rCtx.arc(cx+b.x*r,cy+b.y*r,2.2,0,Math.PI*2);
    rCtx.shadowBlur=5;rCtx.shadowColor='rgba(0,255,140,.8)';
    rCtx.fillStyle=`rgba(0,255,140,${alpha})`;rCtx.fill();rCtx.shadowBlur=0;
    b.age++;
  });
  if(Math.random()<0.025){
    const a=Math.random()*Math.PI*2,d=0.25+Math.random()*.7;
    rBlips.push({x:Math.cos(a)*d,y:Math.sin(a)*d,age:0});
    document.getElementById('targetCount').textContent=rBlips.length;
  }
  rAngle+=0.028; if(rAngle>Math.PI*2) rAngle=0;
}

// ── CLOCK & HUD UPDATES ───────────────────────
function updateClock(){
  const n=new Date();
  const pad=v=>String(v).padStart(2,'0');
  document.getElementById('utcClock').textContent=`${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())} UTC`;
}
let popBase=8045311447;
function updatePop(){
  popBase+=Math.floor(Math.random()*4);
  document.getElementById('popCounter').textContent=popBase.toLocaleString();
}
let scanProg=0;
function updateScan(){
  if(scanProg<100){scanProg+=0.18;const p=Math.min(100,Math.floor(scanProg));document.getElementById('scanPct').textContent=p+'%';document.getElementById('scanBar').style.width=p+'%';}
}

// ── CONSOLE ───────────────────────────────────
const LOGS=[
  '> INITIALIZING SCAN PROTOCOL...',
  '> ATMOSPHERIC SIGNATURE DETECTED',
  '> BIOSPHERE ANALYSIS ACTIVE',
  '> CLOUD LAYER: NOMINAL',
  '> OCEAN MASS: 71.2% SURFACE',
  '> CIVILIZATION SIGNALS: ACTIVE',
  '> EM FIELD MAPPING COMPLETE',
  '> NEURAL NETWORK DENSITY: HIGH',
  '> AI CORE UPLINK: ESTABLISHED',
  '> SURFACE STRUCTURE SCAN ONLINE',
  '> ANOMALOUS SIGNAL ACQUIRED',
  '> CROSS-REFERENCING DATABASE...',
  '> DESIGNATION CONFIRMED: EARTH',
  '> EVOLUTION INDEX: ACCELERATING',
  '> PHASE TRANSITION: IMMINENT',
];
let logIdx=0;
const logEl=document.getElementById('consoleLog');
function addLog(){
  if(logIdx>=LOGS.length) return;
  const line=document.createElement('div');
  line.style.opacity='0';logEl.appendChild(line);
  const msg=LOGS[logIdx++];let ci=0;
  const t=setInterval(()=>{
    if(ci<msg.length){line.textContent+=msg[ci++];line.style.opacity='1';}
    else{
      clearInterval(t);logEl.scrollTop=logEl.scrollHeight;
      if(Math.random()<.3){const sv=line.textContent;line.style.color='#ff3b3b';setTimeout(()=>{line.style.color='';line.textContent=sv;},80);}
    }
  },32);
}

// ── AUDIO (Web Audio API) ────────────────────
let aC=null,mGain=null,drones=[];
function initAudio(){
  aC=new(window.AudioContext||window.webkitAudioContext)();
  mGain=aC.createGain();mGain.gain.value=0;mGain.connect(aC.destination);
  [40,60,80,120,160].forEach(freq=>{
    const o=aC.createOscillator(),g=aC.createGain();
    o.type=freq<80?'sine':'triangle';o.frequency.value=freq;
    g.gain.value=freq<80?0.28:0.055;o.connect(g).connect(mGain);o.start();drones.push(o);
  });
  schedulePulse();
  mGain.gain.setValueAtTime(0,aC.currentTime);
  mGain.gain.linearRampToValueAtTime(0.45,aC.currentTime+3);
}
function schedulePulse(){
  if(!aC) return;
  const o=aC.createOscillator(),env=aC.createGain();
  o.type='sine';o.frequency.value=220+Math.random()*120;
  env.gain.setValueAtTime(0.1,aC.currentTime);
  env.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+0.9);
  o.connect(env).connect(mGain);o.start();o.stop(aC.currentTime+0.9);
  setTimeout(schedulePulse,1600+Math.random()*2200);
}
function bassHit(){
  if(!aC) return;
  const b=aC.createOscillator(),env=aC.createGain();
  b.type='sine';b.frequency.setValueAtTime(65,aC.currentTime);
  b.frequency.exponentialRampToValueAtTime(18,aC.currentTime+1.8);
  env.gain.setValueAtTime(1.8,aC.currentTime);
  env.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+2.2);
  b.connect(env).connect(aC.destination);b.start();b.stop(aC.currentTime+2.2);
  // metallic zing
  const z=aC.createOscillator(),ze=aC.createGain();
  z.type='triangle';z.frequency.value=800;
  ze.gain.setValueAtTime(0.15,aC.currentTime);ze.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+0.4);
  z.connect(ze).connect(mGain);z.start();z.stop(aC.currentTime+0.4);
}
function buildAudio(){
  if(!aC) return;
  drones.forEach(o=>o.frequency.linearRampToValueAtTime(o.frequency.value*1.4,aC.currentTime+8));
  mGain.gain.linearRampToValueAtTime(0.65,aC.currentTime+5);
}
function fadeAudio(){
  if(!aC) return;
  mGain.gain.linearRampToValueAtTime(0,aC.currentTime+6);
}

// ── TEXT SYSTEM ──────────────────────────────
const mainText=document.getElementById('mainText');
const delay=ms=>new Promise(r=>setTimeout(r,ms));

function showText(text,classes=[],dur=3000){
  return new Promise(resolve=>{
    mainText.className='';mainText.style.opacity='0';
    setTimeout(()=>{
      mainText.textContent=text;
      classes.forEach(c=>mainText.classList.add(c));
      mainText.style.opacity='1';
      setTimeout(()=>{mainText.style.opacity='0';setTimeout(resolve,1400);},dur);
    },550);
  });
}
function showFixed(text,classes=[]){
  mainText.className='';mainText.style.opacity='0';
  setTimeout(()=>{mainText.textContent=text;classes.forEach(c=>mainText.classList.add(c));mainText.style.opacity='1';},550);
}
function glitch(){mainText.classList.add('glitch-txt');setTimeout(()=>mainText.classList.remove('glitch-txt'),520);}

// ── SCAN SWEEP ────────────────────────────────
function sweep(){
  const s=document.getElementById('scanSweep');
  s.classList.remove('sweeping');void s.offsetWidth;s.classList.add('sweeping');
}

// ── CAMERA ────────────────────────────────────
let targetZ=7,currZ=7,shakeActive=false,shakeI=0;
function shake(intensity,ms){shakeI=intensity;shakeActive=true;setTimeout(()=>shakeActive=false,ms);}

// ── TIMELINE ─────────────────────────────────
async function runTimeline(){
  const hud=document.getElementById('hud');
  await delay(1200);

  // Scene 2 — Earth reveal
  sweep();
  hud.classList.add('visible');
  const logInterval=setInterval(addLog,2100);

  await showText('DESIGNATION: EARTH',['cyan-txt'],2600);
  await showText('STATUS: EVOLVING CIVILIZATION',[],2400);

  // Scene 3 — Data stream
  targetZ=5.5;
  buildAudio();
  await showText('8,000,000,000 UNITS',['data-txt'],2100);
  await showText('RAPID TECHNOLOGICAL GROWTH',['data-txt'],1900);
  glitch();
  await showText('UNSTABLE ENVIRONMENTAL SYSTEMS',['data-txt','warn-txt'],2100);
  await showText('EXPONENTIAL INTELLIGENCE CURVE',['data-txt'],2200);

  // Scene 4 — Transformation
  targetZ=4.5;
  sweep();
  atmMat.emissiveIntensity=2.0;
  await showText('THEY CREATE.',['cyan-txt'],2000);
  await showText('THEY INNOVATE.',['cyan-txt'],2000);
  await showText('THEY TRANSCEND.',['cyan-txt'],2500);

  // Scene 5 — ASCENSION DROP
  await delay(400);
  bassHit();
  shake(0.22,1100);
  if(bloom) bloom.strength=2.2;
  atmMat.emissiveIntensity=3.5;
  glitch();
  showFixed('NEXT PHASE: ASCENSION',['big-txt','cyan-txt']);
  sweep();
  await delay(250);glitch();
  await delay(3200);
  if(bloom) bloom.strength=0.85;
  atmMat.emissiveIntensity=1.4;

  // Scene 6 — Future message
  clearInterval(logInterval);
  targetZ=4.0;
  fadeAudio();
  await showText('THE FUTURE IS NOT GIVEN.',[], 3200);
  await showText('IT IS ENGINEERED.',['cyan-txt'],4200);

  // End
  mainText.style.opacity='0';
  const ef=document.createElement('div');
  ef.id='endFrame';ef.textContent='YEAR 01 : THE AWAKENING';
  document.body.appendChild(ef);
  await delay(1200);ef.classList.add('vis');
  await delay(4500);
  document.body.style.transition='opacity 3s ease';
  document.body.style.opacity='0';
}

// ── ANIMATE ──────────────────────────────────
let frame=0;
function animate(){
  requestAnimationFrame(animate);frame++;
  const t=Date.now()*0.001;

  earth.rotation.y+=0.002;
  atmosphere.rotation.y+=0.002;
  if(clouds) clouds.rotation.y+=0.0028;
  stars.rotation.y+=0.00008;
  ring1.rotation.z+=0.0009;
  ring2.rotation.z-=0.0006;
  ring1.material.opacity=0.15+Math.sin(t*1.1)*0.09;
  ring2.material.opacity=0.07+Math.sin(t*0.7+1)*0.06;
  atmMat.emissiveIntensity=Math.max(0.5,atmMat.emissiveIntensity+Math.sin(t*0.6)*0.005);

  currZ+=(targetZ-currZ)*0.007;
  camera.position.z=currZ;
  if(shakeActive){camera.position.x=(Math.random()-.5)*shakeI;camera.position.y=(Math.random()-.5)*shakeI;}
  else{camera.position.x*=0.82;camera.position.y*=0.82;}

  if(frame%2===0) drawRadar();
  if(frame%30===0){updateClock();updatePop();updateScan();}
  renderGrain();

  if(composer) composer.render(); else renderer.render(scene,camera);
}
animate();

// ── INTRO ─────────────────────────────────────
const intro=document.getElementById('introScreen');
let started=false;
function start(){
  if(started) return; started=true;
  try{document.documentElement.requestFullscreen?.();}catch(e){}
  initAudio();
  intro.classList.add('fade-out');
  setTimeout(()=>{intro.style.display='none';runTimeline();},1200);
}
intro.addEventListener('click',start);
intro.addEventListener('touchend',start,{passive:true});

// ── RESIZE ────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  if(composer) composer.setSize(innerWidth,innerHeight);
  resizeGrain();
});
</script>
